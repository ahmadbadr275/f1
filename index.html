<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D F1 Racing Game</title>
<style>
  body { margin:0; overflow:hidden; background:#87ceeb; font-family:sans-serif; }
  #hud { position:absolute; top:10px; left:10px; color:white; font-size:18px; z-index:1; }
</style>
</head>
<body>
<div id="hud">Speed: 0 km/h | Lap: 1</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// === Scene Setup ===
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
let ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

let directional = new THREE.DirectionalLight(0xffffff, 1);
directional.position.set(20,40,20);
directional.castShadow = true;
scene.add(directional);

// Ground
let groundGeometry = new THREE.PlaneGeometry(500,500);
let groundMaterial = new THREE.MeshStandardMaterial({color:0x228B22});
let ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// Track (simple straight)
let trackGeometry = new THREE.BoxGeometry(5,0.2,200);
let trackMaterial = new THREE.MeshStandardMaterial({color:0x333333});
let track = new THREE.Mesh(trackGeometry, trackMaterial);
track.position.z = 100;
track.receiveShadow = true;
scene.add(track);

// === Load F1 Car Model ===
let loader = new THREE.GLTFLoader();
let car;
loader.load(
  'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/models/gltf/Ferrari.glb', // example free car GLB
  function(gltf){
    car = gltf.scene;
    car.scale.set(0.01,0.01,0.01); // adjust scale for this model
    car.position.set(0,0.05,0);
    car.rotation.y = Math.PI; // face forward
    scene.add(car);
  },
  undefined,
  function(error){ console.error(error); }
);

// Camera start
camera.position.set(0,5,10);
camera.lookAt(0,0,0);

// Controls
let speed = 0;
let turn = 0;
const maxSpeed = 0.8;
const acceleration = 0.03;
const turnSpeed = 0.04;

let keys = {};
document.addEventListener('keydown',(e)=>{ keys[e.key]=true; });
document.addEventListener('keyup',(e)=>{ keys[e.key]=false; });

let lap = 1;

// Animate loop
function animate(){
    requestAnimationFrame(animate);
    if(car){
        // Movement
        if(keys['ArrowUp']||keys['w']) speed+=acceleration;
        else if(keys['ArrowDown']||keys['s']) speed-=acceleration;
        else speed*=0.95;
        if(speed>maxSpeed) speed=maxSpeed;
        if(speed<-maxSpeed) speed=-maxSpeed;

        if(keys['ArrowLeft']||keys['a']) turn = turnSpeed;
        else if(keys['ArrowRight']||keys['d']) turn = -turnSpeed;
        else turn=0;

        car.rotation.y += turn*speed*5;
        car.position.x -= Math.sin(car.rotation.y)*speed;
        car.position.z -= Math.cos(car.rotation.y)*speed;

        if(car.position.z>200){ lap++; car.position.z=0; }

        // Camera follow
        camera.position.lerp(new THREE.Vector3(
            car.position.x + Math.sin(car.rotation.y)*10,
            car.position.y + 5,
            car.position.z + Math.cos(car.rotation.y)*10
        ),0.1);
        camera.lookAt(car.position);

        // HUD
        document.getElementById('hud').innerText = `Speed: ${Math.abs(speed*100).toFixed(0)} km/h | Lap: ${lap}`;
    }

    renderer.render(scene,camera);
}
animate();

// Handle resize
window.addEventListener('resize',()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
