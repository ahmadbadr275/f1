<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D F1 Racing Game</title>
<style>
  body { margin:0; overflow:hidden; background:#111; font-family:sans-serif; }
  #hud { position:absolute; top:10px; left:10px; color:white; font-size:18px; z-index:1; }
</style>
</head>
<body>
<div id="hud">Speed: 0 km/h | Lap: 1</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Lights
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,10,10);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

// Track (plane)
let trackGeometry = new THREE.PlaneGeometry(200, 50);
let trackMaterial = new THREE.MeshStandardMaterial({color:0x333333});
let track = new THREE.Mesh(trackGeometry, trackMaterial);
track.rotation.x = -Math.PI/2;
scene.add(track);

// Car (placeholder cube)
let carGeometry = new THREE.BoxGeometry(1,0.5,2);
let carMaterial = new THREE.MeshStandardMaterial({color:0xff0000});
let car = new THREE.Mesh(carGeometry, carMaterial);
car.position.y = 0.25;
scene.add(car);

// Camera start
camera.position.set(0,5,10);
camera.lookAt(car.position);

// Controls
let speed = 0;
let turn = 0;
const maxSpeed = 0.5;
const acceleration = 0.02;
const turnSpeed = 0.03;

let keys = {};
document.addEventListener('keydown', (e)=>{ keys[e.key] = true; });
document.addEventListener('keyup', (e)=>{ keys[e.key] = false; });

// Game loop
function animate(){
    requestAnimationFrame(animate);

    // Forward/back
    if(keys['ArrowUp'] || keys['w']) speed += acceleration;
    else if(keys['ArrowDown'] || keys['s']) speed -= acceleration;
    else speed *= 0.95; // friction

    if(speed > maxSpeed) speed = maxSpeed;
    if(speed < -maxSpeed) speed = -maxSpeed;

    // Left/right
    if(keys['ArrowLeft'] || keys['a']) turn = turnSpeed;
    else if(keys['ArrowRight'] || keys['d']) turn = -turnSpeed;
    else turn = 0;

    car.rotation.y += turn * speed * 5; // rotate car based on speed
    car.position.x -= Math.sin(car.rotation.y) * speed;
    car.position.z -= Math.cos(car.rotation.y) * speed;

    // Camera follow
    camera.position.x = car.position.x + Math.sin(car.rotation.y) * 10;
    camera.position.z = car.position.z + Math.cos(car.rotation.y) * 10;
    camera.position.y = car.position.y + 5;
    camera.lookAt(car.position);

    // HUD
    document.getElementById('hud').innerText = `Speed: ${Math.abs(speed*100).toFixed(0)} km/h | Lap: 1`;

    renderer.render(scene, camera);
}
animate();

// Handle window resize
window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
